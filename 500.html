<!DOCTYPE html>
<html lang="en" data-theme="light">
<script>try{var st=localStorage.getItem('moonraker-theme');if(st){document.documentElement.setAttribute('data-theme',st)}}catch(e){}</script>
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something Went Wrong - Moonraker</title>
<link rel="icon" type="image/png" href="/assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root[data-theme="light"] { --bg: #F8FAFC; --surface: #FFFFFF; --border: #E2E8F0; --heading: #0F172A; --body: #334155; --muted: #64748B; --primary: #00D47E; --warning: #F59E0B; }
:root[data-theme="dark"] { --bg: #0A1510; --surface: #12211B; --border: #1F3328; --heading: #E8F5EF; --body: #C9D9D1; --muted: #7A8F83; --primary: #00D47E; --warning: #F59E0B; }
* { box-sizing: border-box; }
body { margin: 0; min-height: 100vh; font-family: Inter, -apple-system, sans-serif; background: var(--bg); color: var(--body); display: flex; align-items: center; justify-content: center; padding: 2rem; }
.card { max-width: 520px; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.04); }
.logo { width: 56px; height: 56px; margin: 0 auto 1.5rem; display: block; }
.code { font-family: Outfit, sans-serif; font-size: 4rem; font-weight: 700; color: var(--warning); line-height: 1; margin: 0 0 .5rem; }
h1 { font-family: Outfit, sans-serif; font-size: 1.4rem; font-weight: 600; color: var(--heading); margin: 0 0 .75rem; }
p { color: var(--body); font-size: .95rem; line-height: 1.55; margin: 0 0 1.75rem; }
.muted { color: var(--muted); font-size: .82rem; margin-top: 1.25rem; }
.btn { display: inline-block; background: var(--primary); color: #0A1510; text-decoration: none; font-weight: 600; font-family: Outfit, sans-serif; padding: .75rem 1.5rem; border-radius: 10px; font-size: .95rem; transition: transform .15s ease; }
.btn:hover { transform: translateY(-1px); }
</style>
</head>
<body>
<div class="card">
<img class="logo" src="/assets/logo.png" alt="Moonraker">
<div class="code">500</div>
<h1>Something went wrong on our end</h1>
<p>This isn't you. Our team has been notified. If this keeps happening, please reach out and we'll take a look right away.</p>
<a class="btn" href="/">Back to Client HQ</a>
<p class="muted">Need help now? Email <a href="mailto:support@moonraker.ai" style="color:var(--primary);">support@moonraker.ai</a></p>
</div>
</body>
</html>
