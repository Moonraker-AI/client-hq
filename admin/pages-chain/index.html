<!DOCTYPE html>
<html lang="en" data-theme="light">
<script>try{var st=localStorage.getItem('moonraker-theme');if(st){document.documentElement.setAttribute('data-theme',st)}}catch(e){}</script>
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/assets/logo.png">
<title>Pages Chain - Client HQ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

:root, [data-theme="light"] {
  --color-primary: #00D47E;
  --color-primary-hover: #00b86c;
  --color-primary-light: #B4EEE0;
  --color-primary-subtle: #DDF8F2;
  --color-bg: #F7FDFB;
  --color-surface: #FFFFFF;
  --color-border: #E2E8F0;
  --color-heading: #1E2A5E;
  --color-body: #333F70;
  --color-muted: #6B7599;
  --color-navy: #141C3A;
  --color-success: #00D47E;
  --color-warning: #F59E0B;
  --color-amber-deep: #D97706;
  --color-danger: #EF4444;
  --color-info: #3B82F6;
  --color-violet: #8B5CF6;
}
[data-theme="dark"] {
  --color-primary: #00D47E;
  --color-primary-hover: #00f598;
  --color-primary-light: #1A4A38;
  --color-primary-subtle: #0D2E22;
  --color-bg: #080F0B;
  --color-surface: #0E1A14;
  --color-border: #1E3530;
  --color-heading: #E8F5EF;
  --color-body: #C8D8D0;
  --color-muted: #5A7A6E;
  --color-navy: #0A1630;
  --color-warning: #F59E0B;
  --color-amber-deep: #FBBF24;
  --color-danger: #FF6B6B;
  --color-info: #60A5FA;
  --color-violet: #A78BFA;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; color: var(--color-body); background: var(--color-bg); line-height: 1.6; }
::view-transition-old(root), ::view-transition-new(root) { animation-duration: .25s; }
h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; font-weight: 700; color: var(--color-heading); }

a { color: var(--color-primary); text-decoration: none; }
a:hover { text-decoration: underline; }

.page { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }
.page-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid var(--color-primary); }
.page-header h1 { font-size: 1.5rem; line-height: 1.2; margin-bottom: .15rem; }
.page-header .subtitle { font-size: .85rem; color: var(--color-muted); }
.client-pill { display: inline-flex; align-items: center; gap: .35rem; padding: .25rem .6rem; background: var(--color-primary-subtle); color: var(--color-primary-hover); border-radius: 6px; font-size: .78rem; font-weight: 600; font-family: 'SF Mono', 'Fira Code', monospace; }

.theme-toggle { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 50%; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
.theme-toggle:hover { border-color: var(--color-primary); }

.summary-row { display: flex; gap: .75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
.summary-pill { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 8px; padding: .5rem .85rem; font-size: .82rem; }
.summary-pill .num { font-family: 'Outfit', sans-serif; font-weight: 700; color: var(--color-heading); font-size: 1rem; margin-right: .35rem; }
.summary-pill .label { color: var(--color-muted); }
.summary-pill.contract { background: var(--color-primary-subtle); border-color: var(--color-primary-light); }
.summary-pill.contract .num { color: var(--color-primary-hover); }

/* Card list */
.card-list { display: flex; flex-direction: column; gap: .65rem; }

.card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color .15s, box-shadow .15s;
}
.card:hover { border-color: var(--color-primary-light); }
.card.expanded { border-color: var(--color-primary); box-shadow: 0 4px 16px rgba(0,212,126,.08); }

.card-header {
  display: grid;
  grid-template-columns: minmax(180px, 1fr) auto auto auto auto;
  gap: 1rem;
  align-items: center;
  padding: .85rem 1rem;
  cursor: pointer;
  user-select: none;
}
.card-header:hover { background: var(--color-bg); }
.card.expanded .card-header { background: var(--color-bg); border-bottom: 1px solid var(--color-border); }

.page-name {
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  color: var(--color-heading);
  font-size: .95rem;
  display: flex;
  align-items: center;
  gap: .5rem;
  min-width: 0;
}
.page-name .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.page-type-pill {
  display: inline-block;
  padding: .12rem .4rem;
  border-radius: 4px;
  font-size: .68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
  flex-shrink: 0;
}
.page-type-pill.homepage { background: var(--color-primary-subtle); color: var(--color-primary-hover); }
.page-type-pill.service { background: rgba(59,130,246,.1); color: var(--color-info); }
.page-type-pill.location { background: rgba(139,92,246,.1); color: var(--color-violet); }
.page-type-pill.faq { background: rgba(107,117,153,.1); color: var(--color-muted); }
.page-type-pill.bio { background: rgba(245,158,11,.12); color: var(--color-amber-deep); }

/* Stage track */
.stage-track {
  display: flex;
  gap: .35rem;
  align-items: center;
}
.stage-dot {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .58rem;
  font-weight: 600;
  font-family: 'Outfit', sans-serif;
  border: 1.5px solid var(--color-border);
  background: var(--color-surface);
  color: var(--color-muted);
  cursor: pointer;
  transition: transform .1s;
  position: relative;
}
.stage-dot:hover { transform: scale(1.12); }
.stage-dot.pending { /* default */ }
.stage-dot.running {
  border-color: var(--color-info);
  color: var(--color-info);
  background: rgba(59,130,246,.08);
}
.stage-dot.running::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 1.5px solid var(--color-info);
  border-top-color: transparent;
  animation: spin .9s linear infinite;
}
.stage-dot.review {
  border-color: var(--color-warning);
  color: var(--color-warning);
  background: rgba(245,158,11,.1);
}
.stage-dot.questions {
  border-color: var(--color-amber-deep);
  color: var(--color-amber-deep);
  background: rgba(245,158,11,.16);
}
.stage-dot.accepted {
  border-color: var(--color-primary);
  color: var(--color-primary-hover);
  background: var(--color-primary-subtle);
}
.stage-dot.failed {
  border-color: var(--color-danger);
  color: var(--color-danger);
  background: rgba(239,68,68,.1);
}
.stage-dot[data-skipped="1"] { opacity: .35; }
.stage-dot[data-skipped="1"]:hover { transform: none; cursor: not-allowed; }

@keyframes spin { to { transform: rotate(360deg); } }

.stage-track-label { font-size: .68rem; color: var(--color-muted); margin-left: .25rem; }

/* Status badge */
.status-badge {
  font-size: .72rem;
  font-weight: 600;
  padding: .2rem .55rem;
  border-radius: 5px;
  white-space: nowrap;
}
.status-badge.pre { background: rgba(107,117,153,.12); color: var(--color-muted); }
.status-badge.chain { background: rgba(59,130,246,.1); color: var(--color-info); }
.status-badge.ready { background: var(--color-primary-subtle); color: var(--color-primary-hover); }
.status-badge.client { background: rgba(139,92,246,.12); color: var(--color-violet); }
.status-badge.delivered { background: rgba(0,212,126,.15); color: var(--color-primary-hover); }
.status-badge.lost { background: rgba(239,68,68,.1); color: var(--color-danger); }

.notif-cluster { display: flex; gap: .35rem; }
.notif-badge {
  font-size: .68rem;
  font-weight: 600;
  padding: .15rem .45rem;
  border-radius: 4px;
  display: inline-flex;
  align-items: center;
  gap: .25rem;
  white-space: nowrap;
}
.notif-badge.questions { background: rgba(245,158,11,.16); color: var(--color-amber-deep); border: 1px solid rgba(245,158,11,.3); }
.notif-badge.review { background: rgba(59,130,246,.1); color: var(--color-info); border: 1px solid rgba(59,130,246,.3); }
.notif-badge.gate { background: rgba(239,68,68,.1); color: var(--color-danger); border: 1px solid rgba(239,68,68,.3); }

.expand-caret {
  font-size: .65rem;
  color: var(--color-muted);
  transition: transform .2s;
}
.card.expanded .expand-caret { transform: rotate(180deg); }

/* Expanded body */
.card-body {
  padding: 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height .25s ease;
}
.card.expanded .card-body { max-height: 4000px; padding: 1rem 1.25rem 1.25rem; }

/* ── Stage timeline ────────────────────────────────────── */
.stage-panels { display: flex; flex-direction: column; gap: .5rem; margin-top: .5rem; }

.stage-panel {
  border: 1px solid var(--color-border);
  border-radius: 10px;
  background: var(--color-surface);
  overflow: hidden;
}
.stage-panel.skipped { opacity: .55; }

.stage-panel-header {
  display: grid;
  grid-template-columns: 24px minmax(140px, auto) 1fr auto;
  gap: .85rem;
  align-items: center;
  padding: .65rem .9rem;
  cursor: pointer;
  user-select: none;
}
.stage-panel-header:hover { background: var(--color-bg); }
.stage-panel.open .stage-panel-header { background: var(--color-bg); border-bottom: 1px solid var(--color-border); }

.stage-panel-glyph {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: .65rem;
  border: 1.5px solid var(--color-border);
  color: var(--color-muted);
  background: var(--color-surface);
}
.stage-panel-glyph.running { border-color: var(--color-info); color: var(--color-info); background: rgba(59,130,246,.08); }
.stage-panel-glyph.review { border-color: var(--color-warning); color: var(--color-warning); background: rgba(245,158,11,.1); }
.stage-panel-glyph.questions { border-color: var(--color-amber-deep); color: var(--color-amber-deep); background: rgba(245,158,11,.16); }
.stage-panel-glyph.accepted { border-color: var(--color-primary); color: var(--color-primary-hover); background: var(--color-primary-subtle); }
.stage-panel-glyph.failed { border-color: var(--color-danger); color: var(--color-danger); background: rgba(239,68,68,.1); }

.stage-panel-name { font-family: 'Outfit', sans-serif; font-weight: 600; color: var(--color-heading); font-size: .92rem; }
.stage-panel-summary { font-size: .78rem; color: var(--color-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stage-panel-actions { display: flex; gap: .35rem; align-items: center; }

.btn { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: .76rem; padding: .35rem .75rem; border-radius: 6px; border: 1px solid transparent; cursor: pointer; white-space: nowrap; }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-primary { background: var(--color-primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--color-primary-hover); }
.btn-ghost { background: transparent; color: var(--color-body); border-color: var(--color-border); }
.btn-ghost:hover:not(:disabled) { border-color: var(--color-primary); color: var(--color-primary-hover); }
.btn-danger-ghost { background: transparent; color: var(--color-danger); border-color: var(--color-border); }
.btn-danger-ghost:hover:not(:disabled) { border-color: var(--color-danger); }

.stage-panel-body {
  padding: 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height .25s ease;
}
.stage-panel.open .stage-panel-body { max-height: 6000px; padding: 1rem 1.1rem 1.1rem; }

/* Tabs inside a stage panel */
.tab-strip { display: flex; gap: 0; border-bottom: 1.5px solid var(--color-border); margin-bottom: .85rem; flex-wrap: wrap; }
.tab-btn {
  padding: .45rem 1rem; font-family: 'Outfit', sans-serif; font-size: .82rem; font-weight: 600;
  color: var(--color-muted); background: none; border: none; border-bottom: 2px solid transparent;
  cursor: pointer; margin-bottom: -1.5px; transition: color .15s, border-color .15s;
}
.tab-btn:hover { color: var(--color-heading); }
.tab-btn.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* Findings list */
.findings-list { display: flex; flex-direction: column; gap: .4rem; }
.finding {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: .65rem;
  padding: .55rem .75rem;
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: 8px;
  font-size: .82rem;
}
.finding-sev {
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: .7rem;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px; padding: .15rem .25rem;
}
.finding-sev.P0 { background: rgba(239,68,68,.18); color: var(--color-danger); }
.finding-sev.P1 { background: rgba(245,158,11,.2); color: var(--color-amber-deep); }
.finding-sev.P2 { background: rgba(59,130,246,.15); color: var(--color-info); }
.finding-sev.P3 { background: rgba(107,117,153,.15); color: var(--color-muted); }
.finding-body { min-width: 0; }
.finding-title { font-weight: 600; color: var(--color-heading); margin-bottom: .15rem; font-size: .82rem; }
.finding-loc { font-family: 'SF Mono', 'Fira Code', monospace; font-size: .72rem; color: var(--color-muted); margin-bottom: .25rem; word-break: break-all; }
.finding-rec { color: var(--color-body); font-size: .8rem; line-height: 1.45; }

/* Score block */
.score-block {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: .5rem;
  background: var(--color-bg);
  padding: .75rem;
  border: 1px solid var(--color-border);
  border-radius: 8px;
  margin-bottom: .85rem;
}
.score-cell { text-align: center; padding: .35rem 0; }
.score-cell .num { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.15rem; color: var(--color-heading); display: block; }
.score-cell .label { font-size: .68rem; text-transform: uppercase; letter-spacing: .04em; color: var(--color-muted); }
.score-cell.total .num { color: var(--color-primary-hover); }
.score-cell.bad .num { color: var(--color-danger); }
.score-cell.warn .num { color: var(--color-amber-deep); }

/* Persona red flags */
.persona-block { background: var(--color-bg); padding: .75rem .85rem; border: 1px solid var(--color-border); border-radius: 8px; margin-bottom: .5rem; }
.persona-block h4 { font-size: .82rem; margin-bottom: .35rem; color: var(--color-heading); }
.persona-block ul { margin: 0; padding-left: 1.25rem; font-size: .8rem; line-height: 1.55; }
.persona-block li { color: var(--color-body); margin-bottom: .15rem; }

/* HTML preview iframe */
.preview-wrap {
  border: 1px solid var(--color-border);
  border-radius: 8px;
  overflow: hidden;
  background: #fff;
  height: 600px;
}
.preview-wrap iframe { width: 100%; height: 100%; border: 0; background: #fff; }
.preview-empty { padding: 2rem; text-align: center; color: var(--color-muted); font-size: .85rem; }

/* Diff */
.diff-summary { background: var(--color-primary-subtle); border: 1px solid var(--color-primary-light); border-radius: 8px; padding: .65rem .85rem; margin-bottom: .85rem; font-size: .85rem; line-height: 1.5; }
.diff-changes { display: flex; flex-direction: column; gap: .4rem; }
.diff-change {
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: 8px;
  padding: .55rem .75rem;
  font-size: .82rem;
}
.diff-change-section { font-weight: 600; color: var(--color-heading); margin-bottom: .25rem; }
.diff-change-reason { color: var(--color-body); font-size: .78rem; line-height: 1.5; }

/* Source HTML viewer */
.source-html-pre {
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: 8px;
  padding: .75rem;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: .72rem;
  line-height: 1.55;
  max-height: 500px;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--color-body);
}

/* Clarifying questions strip */
.questions-strip {
  background: rgba(245,158,11,.08);
  border: 1px solid rgba(245,158,11,.3);
  border-radius: 8px;
  padding: .55rem .85rem;
  margin-bottom: .85rem;
  font-size: .82rem;
  display: flex;
  align-items: center;
  gap: .65rem;
  flex-wrap: wrap;
}
.questions-strip-icon { font-size: 1rem; color: var(--color-amber-deep); }
.questions-strip-text { color: var(--color-heading); flex: 1; }
.questions-strip a { color: var(--color-amber-deep); font-weight: 600; cursor: pointer; }

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(20,28,58,.55); z-index: 500;
  display: flex; align-items: center; justify-content: center; padding: 1.5rem;
}
.modal {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: 14px; max-width: 580px; width: 100%; max-height: 86vh;
  overflow: auto; box-shadow: 0 24px 60px rgba(20,28,58,.35);
}
.modal-header { padding: 1rem 1.25rem .65rem; border-bottom: 1px solid var(--color-border); }
.modal-header h3 { font-size: 1rem; margin-bottom: .15rem; }
.modal-header .topic { font-size: .75rem; color: var(--color-muted); text-transform: uppercase; letter-spacing: .04em; }
.modal-body { padding: 1rem 1.25rem; }
.modal-body .question { font-size: .9rem; color: var(--color-heading); margin-bottom: .75rem; line-height: 1.5; }
.modal-body .options { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 8px; padding: .65rem .85rem; margin-bottom: .75rem; }
.modal-body .options-label { font-size: .68rem; color: var(--color-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .35rem; }
.modal-body .option-row { display: flex; align-items: flex-start; gap: .5rem; padding: .35rem 0; cursor: pointer; }
.modal-body .option-row:hover { color: var(--color-primary-hover); }
.modal-body .option-row input { margin-top: .35rem; flex-shrink: 0; }
.modal-body .option-row label { font-size: .82rem; cursor: pointer; line-height: 1.45; }
.modal-body .decision { background: var(--color-primary-subtle); border: 1px solid var(--color-primary-light); border-radius: 8px; padding: .55rem .75rem; font-size: .8rem; line-height: 1.5; margin-bottom: .65rem; }
.modal-body .decision strong { color: var(--color-primary-hover); }
.modal-body textarea { width: 100%; min-height: 60px; padding: .5rem .65rem; border: 1px solid var(--color-border); border-radius: 6px; background: var(--color-surface); color: var(--color-body); font-family: 'Inter', sans-serif; font-size: .82rem; resize: vertical; }
.modal-body textarea:focus { outline: 2px solid var(--color-primary); outline-offset: -1px; border-color: var(--color-primary); }
.modal-actions { display: flex; gap: .5rem; justify-content: flex-end; padding: .75rem 1.25rem 1rem; border-top: 1px solid var(--color-border); }

/* Promote bar */
.promote-bar {
  background: var(--color-primary-subtle);
  border: 1px solid var(--color-primary);
  border-radius: 10px;
  padding: .85rem 1rem;
  margin-top: .85rem;
  display: flex;
  align-items: center;
  gap: .85rem;
  flex-wrap: wrap;
}
.promote-bar-text { flex: 1; font-size: .85rem; }
.promote-bar-text strong { color: var(--color-primary-hover); display: block; font-family: 'Outfit', sans-serif; font-size: .9rem; margin-bottom: .15rem; }

/* Empty state for stage with no run */
.stage-empty { padding: .85rem 1rem; color: var(--color-muted); font-size: .82rem; background: var(--color-bg); border: 1px dashed var(--color-border); border-radius: 8px; }
.stage-empty .hint { font-size: .75rem; margin-top: .25rem; }

.body-meta-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: .65rem;
  margin-bottom: 1rem;
  font-size: .8rem;
}
.body-meta-grid .meta { background: var(--color-bg); padding: .55rem .75rem; border-radius: 8px; }
.body-meta-grid .meta-label { font-size: .68rem; text-transform: uppercase; letter-spacing: .04em; color: var(--color-muted); margin-bottom: .15rem; }
.body-meta-grid .meta-value { font-weight: 500; color: var(--color-heading); font-size: .85rem; }
.body-meta-grid .meta-value.mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: .78rem; }

/* Empty state / loading */
.empty-state { text-align: center; padding: 3rem 1.5rem; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 14px; }
.empty-state h3 { font-size: 1.05rem; margin-bottom: .35rem; }
.empty-state p { color: var(--color-muted); font-size: .9rem; max-width: 480px; margin: 0 auto; }

.loading { padding: 2rem; text-align: center; color: var(--color-muted); font-size: .9rem; }

/* Mobile */
@media (max-width: 720px) {
  .page { padding: 1rem; }
  .card-header { grid-template-columns: 1fr auto; gap: .5rem; }
  .stage-track { grid-column: 1 / -1; }

/* RTPBA / Surge inputs panel (above stages, page-scoped) */

}

<script src="/vendor/supabase/supabase-2.49.4.min.js" integrity="sha384-2zrRDgDHSYB/GN3nFW3fsZXoxEhKIr3N2h63Tc6DEOB9JJdFIu8xMJT2Cph/gBil" crossorigin="anonymous" defer></script>

<body>

<div class="page">
  <div class="page-header">
    <div>
      <h1>Pages Chain</h1>
      <div class="subtitle" id="subtitle">Audit, critique, polish, harden, clarify — then verify and send for review.</div>
    </div>
    <div style="display:flex;gap:.65rem;align-items:center;flex-shrink:0;">
      <span id="clientPill" class="client-pill" style="display:none;"></span>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">&#127769;</button>
    </div>
  </div>

  <div class="summary-row" id="summaryRow" style="display:none;"></div>

  <div id="lockBar"></div>

  <div id="content">
    <div class="loading">Loading pages…</div>
  </div>
</div>

<script>
// Stage definitions, ordered. The track on the collapsed card renders these
// in order. Each dot becomes a one-letter glyph: A C P H L V (audit, critique,
// polish, harden, cLarify, verify). Cleaner than full names at small size.
var STAGES = [
  { key: 'audit',    glyph: 'A', label: 'Audit' },
  { key: 'critique', glyph: 'C', label: 'Critique' },
  { key: 'polish',   glyph: 'P', label: 'Polish' },
  { key: 'harden',   glyph: 'H', label: 'Harden' },
  { key: 'clarify',  glyph: 'L', label: 'Clarify' },
  { key: 'verify',   glyph: 'V', label: 'Verify' }
];

// Mirrors api/_lib/page-stage.js PRE_STAGE_STATUS. Used to determine whether
// a stage's Run button should be enabled. Keep in sync with the server.
var PRE_STAGE_STATUS = {
  audit:    ['review', 'generating', 'audited'],
  critique: ['audited', 'critiqued'],
  polish:   ['audited', 'critiqued', 'polished'],
  harden:   ['polished', 'hardened'],
  clarify:  ['hardened', 'clarified'],
  verify:   ['clarified']
};

// Statuses a page must reach before it can enter the chain at all.
// Anything before 'review' (i.e. pending_audit, audit_loaded) means the page
// hasn't been generated yet. The chain audits and improves an existing draft;
// the upstream generator (api/generate-content-page) is what produces it.
var PRE_CHAIN_STATUSES = ['pending_audit', 'audit_loaded', 'generating'];

function isPageInChain(page) {
  return !PRE_CHAIN_STATUSES.includes(page.status);
}

function isStageEligible(page, stageKey) {
  var allowed = PRE_STAGE_STATUS[stageKey] || [];
  return allowed.indexOf(page.status) !== -1;
}

// Subsequent-page chain skips critique. Show the dot but mark it skipped.
function isStageSkipped(page, stageKey) {
  return stageKey === 'critique' && page.page_type !== 'homepage';
}

// Status → badge classification.
function classifyStatus(status) {
  switch (status) {
    case 'pending_audit':
    case 'audit_loaded':
    case 'generating': return { cls: 'pre', label: prettyStatus(status) };
    case 'review':
    case 'audited':
    case 'critiqued':
    case 'polished':
    case 'hardened':
    case 'clarified': return { cls: 'chain', label: prettyStatus(status) };
    case 'ready_for_contract':
    case 'ready_for_client': return { cls: 'ready', label: prettyStatus(status) };
    case 'client_review':
    case 'client_revising': return { cls: 'client', label: prettyStatus(status) };
    case 'approved':
    case 'delivered': return { cls: 'delivered', label: prettyStatus(status) };
    default: return { cls: 'pre', label: prettyStatus(status) };
  }
}

function prettyStatus(s) {
  return (s || '').replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, function(ch) {
    return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[ch];
  });
}

function timeAgo(iso) {
  if (!iso) return '—';
  var then = new Date(iso).getTime();
  var diff = (Date.now() - then) / 1000;
  if (diff < 60) return Math.round(diff) + 's ago';
  if (diff < 3600) return Math.round(diff / 60) + 'm ago';
  if (diff < 86400) return Math.round(diff / 3600) + 'h ago';
  return Math.round(diff / 86400) + 'd ago';
}

// Theme
function toggleTheme() {
  function flip() {
    var cur = document.documentElement.getAttribute('data-theme') || 'light';
    var next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('moonraker-theme', next); } catch (e) {}
  }
  if (document.startViewTransition) document.startViewTransition(flip); else flip();
}

// State
var state = {
  slug: null,
  pages: [],
  contract: null,
  expanded: new Set(),
  openStages: new Set(),
  runDetailCache: {},
  pollTimer: null,
  loading: false
};

function getSlugFromUrl() {
  var p = new URLSearchParams(window.location.search);
  return p.get('slug') || p.get('client') || '';
}

async function load() {
  if (state.loading) return;
  state.loading = true;
  try {
    var resp = await fetch('/api/page-stages/list?slug=' + encodeURIComponent(state.slug), {
      credentials: 'same-origin'
    });
    if (!resp.ok) {
      if (resp.status === 401) {
        document.getElementById('content').innerHTML =
          '<div class="empty-state"><h3>Not signed in</h3>' +
          '<p>Sign in to the admin to view this client\'s pages.</p></div>';
        return;
      }
      var t = await resp.text();
      document.getElementById('content').innerHTML =
        '<div class="empty-state"><h3>Failed to load</h3><p>' + escapeHtml(t.slice(0, 200)) + '</p></div>';
      return;
    }
    var data = await resp.json();
    state.pages = data.pages || [];
    state.contract = data.contract;
    state.contactId = data.contact_id;
    state.activeBatch = data.active_batch || null;
    // If a clarifying-question modal is open, defer rerender to avoid blowing
    // away the operator's in-progress input. Reschedule the poll instead.
    if (document.getElementById('cqModal')) {
      schedulePoll();
      return;
    }
    render(data);
    // After full rerender, restore any open stage panels' tab content. The
    // panel HTML is regenerated empty and hydrated in toggleStagePanel; we
    // need to repaint open ones now.
    state.openStages.forEach(function(key) {
      var parts = key.split(':');
      var pageId = parts[0]; var stageKey = parts[1];
      var panel = document.querySelector('.stage-panel[data-page-id="' + pageId + '"][data-stage="' + stageKey + '"]');
      if (!panel) return;
      panel.classList.add('open');
      var body = panel.querySelector('.stage-panel-body');
      if (!body) return;
      var page = state.pages.find(function(p) { return p.id === pageId; });
      var stageDef = STAGES.find(function(s) { return s.key === stageKey; });
      var stage = page && page.stages ? page.stages[stageKey] : null;
      if (page && stage && stageDef) {
        body.innerHTML = renderStageBody(page, stageDef, stage);
        var firstTab = body.querySelector('.tab-btn.active') || body.querySelector('.tab-btn');
        if (firstTab) loadTabContent(pageId, stageKey, firstTab.getAttribute('data-tab'));
      }
    });
    schedulePoll();
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="empty-state"><h3>Error</h3><p>' + escapeHtml(e.message) + '</p></div>';
  } finally {
    state.loading = false;
  }
}

function schedulePoll() {
  if (state.pollTimer) clearTimeout(state.pollTimer);
  // Poll if any stage run is in flight, a page is currently generating, or
  // any page's Surge is queued/running.
  var anyRunning = state.pages.some(function(p) {
    if (p.status === 'generating') return true;
    if (p.surge_status === 'pending' || p.surge_status === 'processing') return true;
    return Object.keys(p.stages || {}).some(function(s) {
      return p.stages[s].latest && p.stages[s].latest.run_status === 'running';
    });
  });
  // Also poll while an audit batch is mid-flight (covers the agent-side window
  // before per-page surge_status flips happen).
  if (state.activeBatch) anyRunning = true;
  if (anyRunning) {
    state.pollTimer = setTimeout(load, 5000);
  }
}

function render(data) {
  var content = document.getElementById('content');

  // Header pieces
  var clientPill = document.getElementById('clientPill');
  clientPill.textContent = state.slug;
  clientPill.style.display = '';

  // Summary row
  var c = data.counts || {};
  var summary = document.getElementById('summaryRow');
  var summaryHtml = '';
  summaryHtml += pill(c.total || 0, 'pages');
  summaryHtml += pill(c.in_chain || 0, 'in chain');
  summaryHtml += pill(c.ready_for_client || 0, 'ready for client');
  summaryHtml += pill(c.delivered || 0, 'delivered');
  if (state.contract) {
    summaryHtml += '<div class="summary-pill contract" title="Active contract">' +
      '<span class="num">●</span><span class="label">design contract active</span></div>';
  } else {
    summaryHtml += '<div class="summary-pill" title="No contract yet"><span class="num" style="color:var(--color-muted);">○</span>' +
      '<span class="label">no contract yet</span></div>';
  }
  summary.innerHTML = summaryHtml;
  summary.style.display = '';

  // Lock-and-fire bar — campaign-start ceremony when we have un-audited pages
  renderLockBar();

  // Card list
  if (state.pages.length === 0) {
    content.innerHTML =
      '<div class="empty-state"><h3>No pages yet</h3>' +
      '<p>Create pages from this client\'s keywords on the Content tab to start the chain.</p></div>';
    return;
  }

  var cardsHtml = state.pages.map(renderCard).join('');
  content.innerHTML = '<div class="card-list">' + cardsHtml + '</div>';
}

// ── Lock-and-fire bar ──────────────────────────────────────────────
//
// Surfaces two states:
//   1) "Ready to lock" — we have ≥1 page in pending_audit and no in-flight
//      batch. Shows the green Lock button.
//   2) "Audits in flight" — a batch is mid-processing. Shows progress strip,
//      no button. Polling picks up state changes.
//
// When all pages have moved past surge_status='pending', the bar disappears.
function renderLockBar() {
  var bar = document.getElementById('lockBar');
  if (!bar) return;

  // Count pages by surge status. We only consider homepage + service pages
  // — the same set the lock endpoint targets.
  var eligiblePages = state.pages.filter(function(p) {
    return p.page_type === 'homepage' || p.page_type === 'service';
  });
  var counts = { pending: 0, processing: 0, processed: 0, error: 0 };
  eligiblePages.forEach(function(p) {
    var s = p.surge_status || 'pending';
    if (counts[s] === undefined) counts[s] = 0;
    counts[s]++;
  });

  var totalPending = counts.pending || 0;
  var totalProcessing = counts.processing || 0;
  var anyInFlight = state.activeBatch && ['queued','agent_running','extracting','processing'].includes(state.activeBatch.status);

  if (anyInFlight || totalProcessing > 0) {
    var doneCount = (counts.processed || 0) + (counts.error || 0);
    bar.innerHTML =
      '<div class="lock-bar-progress">' +
        '<div class="spinner"></div>' +
        '<div><strong>Surge audits in flight</strong> &nbsp;·&nbsp; ' +
        doneCount + ' of ' + eligiblePages.length + ' complete' +
        (counts.error ? ' &nbsp;·&nbsp; <span style="color:#b91c1c;">' + counts.error + ' error(s)</span>' : '') +
        '</div>' +
      '</div>';
    return;
  }

  if (totalPending === 0) {
    // Everything's audited (or already moved past audit) — nothing to lock
    bar.innerHTML = '';
    return;
  }

  // Ready-to-lock state
  bar.innerHTML =
    '<div class="lock-bar">' +
      '<div class="lock-bar-text">' +
        '<strong>Lock target pages and fire Surge audits</strong>' +
        '<span>' + totalPending + ' page' + (totalPending === 1 ? '' : 's') + ' awaiting audit. ' +
        'This locks the campaign\'s page set and queues per-page Surge audits via the agent. ' +
        'Homepage will auto-link a fresh entity audit if one exists.</span>' +
      '</div>' +
      '<button class="btn btn-primary" onclick="lockAndFire()">Lock + fire audits →</button>' +
    '</div>';
}

async function lockAndFire() {
  if (!confirm('Lock the campaign\'s page set and fire Surge audits?\n\n' +
      'Homepage will auto-link an existing entity audit when one is fresh (≤30 days). ' +
      'Service pages will be queued sequentially via the agent VPS (~5-10 min per page). ' +
      'You\'ll see progress here as each completes.')) return;
  try {
    var resp = await fetch('/api/onboarding/lock-target-pages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ contact_id: state.contactId })
    });
    var data = await resp.json();
    if (!resp.ok) {
      alert('Lock failed: ' + (data.error || resp.status));
      return;
    }
    if (data.already_in_flight) {
      alert('A batch is already in flight for this client.');
    } else {
      var msg = 'Locked. Auto-linked ' + (data.auto_linked_pages || 0) +
        ', queued ' + (data.queued_pages || 0) + '.';
      if (data.errors && data.errors.length > 0) {
        msg += '\n\nErrors:\n' + data.errors.map(function(e) { return '• ' + e.page.name + ': ' + e.message; }).join('\n');
      }
      alert(msg);
    }
    load();
  } catch (e) {
    alert('Network error: ' + e.message);
  }
}

function pill(num, label) {
  return '<div class="summary-pill"><span class="num">' + num + '</span><span class="label">' +
    escapeHtml(label) + '</span></div>';
}

function renderCard(page) {
  var expanded = state.expanded.has(page.id);
  var status = classifyStatus(page.status);
  var notif = page.notifications || {};

  var dotsHtml = STAGES.map(function(s) {
    var stage = (page.stages && page.stages[s.key]) || { ui_state: 'pending' };
    var skipped = isStageSkipped(page, s.key);
    var cls = skipped ? 'pending' : (stage.ui_state || 'pending');
    var title = s.label;
    if (skipped) title += ' (skipped — homepage only)';
    else if (stage.latest) title += ' — ' + stage.ui_state + ' (' + timeAgo(stage.latest.created_at) + ')';
    return '<div class="stage-dot ' + cls + '" data-skipped="' + (skipped ? 1 : 0) + '" title="' + escapeHtml(title) + '" ' +
      'onclick="event.stopPropagation();expandCard(\'' + page.id + '\', \'' + s.key + '\');">' +
      s.glyph + '</div>';
  }).join('');

  var badgesHtml = '';
  if (notif.clarifying_questions > 0) {
    badgesHtml += '<span class="notif-badge questions" title="Clarifying questions to review">' +
      '? ' + notif.clarifying_questions + '</span>';
  }
  if (notif.pending_review > 0) {
    badgesHtml += '<span class="notif-badge review" title="Stage runs awaiting accept/rerun">' +
      '↺ ' + notif.pending_review + '</span>';
  }
  if (notif.verify_gate_failures > 0) {
    badgesHtml += '<span class="notif-badge gate" title="Verify gate failures">' +
      '✕ ' + notif.verify_gate_failures + '</span>';
  }

  var pageType = page.page_type || 'service';
  var lastTouched = page.updated_at || page.created_at;

  // Surge pill — visible only when Surge is meaningful (queued/running/error).
  // Once 'processed', the page status takes over signaling.
  var surgePillHtml = '';
  if (page.surge_status && page.surge_status !== 'processed') {
    var surgeLabel = ({
      pending: 'Surge queued',
      raw_stored: 'Surge raw',
      processing: 'Surge running',
      error: 'Surge failed'
    })[page.surge_status] || ('Surge: ' + page.surge_status);
    surgePillHtml = '<span class="surge-pill ' + escapeHtml(page.surge_status) + '" title="Surge audit status">' +
      '<span class="dot"></span>' + escapeHtml(surgeLabel) + '</span>';
  }

  // Variance badge — surface the Surge variance score when present. Lower is
  // better in Surge's framework: 0-25 Optimized, 26-50 Moderate, 51+ Heavy.
  var varianceHtml = '';
  if (page.variance_score != null && page.variance_score >= 0) {
    var vs = page.variance_score;
    var vCls = vs <= 25 ? 'low' : (vs <= 50 ? 'mid' : 'high');
    varianceHtml = '<span class="variance-badge ' + vCls + '" title="Surge variance score (lower is better)">' +
      '<span class="score">' + vs + '</span>' +
      (page.variance_label ? '<span class="label">' + escapeHtml(page.variance_label.split(' ')[0]) + '</span>' : '') +
      '</span>';
  }

  return '' +
    '<div class="card' + (expanded ? ' expanded' : '') + '" data-page-id="' + page.id + '">' +
      '<div class="card-header" onclick="toggleCard(\'' + page.id + '\')">' +
        '<div class="page-name">' +
          '<span class="page-type-pill ' + escapeHtml(pageType) + '">' + escapeHtml(pageType) + '</span>' +
          '<span class="name" title="' + escapeHtml(page.page_name || '') + '">' + escapeHtml(page.page_name || '(unnamed)') + '</span>' +
          (surgePillHtml || varianceHtml ? '<span style="display:inline-flex;gap:.35rem;margin-left:.5rem;">' + surgePillHtml + varianceHtml + '</span>' : '') +
        '</div>' +
        '<div class="stage-track">' + dotsHtml + '</div>' +
        '<span class="status-badge ' + status.cls + '">' + escapeHtml(status.label) + '</span>' +
        '<div class="notif-cluster">' + badgesHtml + '</div>' +
        '<span class="expand-caret">▼</span>' +
      '</div>' +
      '<div class="card-body">' +
        renderCardBody(page) +
      '</div>' +
    '</div>';
}

function renderCardBody(page) {
  var lastTouched = page.updated_at || page.created_at;
  var keyword = page.target_keyword || '—';
  var notInChain = !isPageInChain(page);

  // Promote action: visible at the top of the body when status warrants it.
  var promoteHtml = '';
  if (page.status === 'ready_for_contract') {
    promoteHtml =
      '<div class="promote-bar">' +
        '<div class="promote-bar-text">' +
          '<strong>Ready to extract design contract</strong>' +
          'Homepage chain complete. Extract the contract so subsequent pages inherit the locked tokens, voice, and copy conventions.' +
        '</div>' +
        '<button class="btn btn-primary" onclick="event.stopPropagation();promotePage(\'' + page.id + '\');">' +
          'Extract contract →</button>' +
      '</div>';
  } else if (page.status === 'ready_for_client') {
    promoteHtml =
      '<div class="promote-bar">' +
        '<div class="promote-bar-text">' +
          '<strong>Ready for client review</strong>' +
          'Page is verified and contract-aligned. Queue it for the client review portal.' +
        '</div>' +
        '<button class="btn btn-primary" onclick="event.stopPropagation();promotePage(\'' + page.id + '\');">' +
          'Queue for client →</button>' +
      '</div>';
  }

  // Pre-chain CTA: page hasn't been generated yet. The chain audits and
  // refines an existing draft — the upstream Pagemaster generator produces
  // the initial HTML. Surface that here so it's not surprising.
  var preChainHtml = '';
  if (notInChain) {
    var generating = (page.status === 'generating');
    preChainHtml =
      '<div class="promote-bar" style="background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.4);">' +
        '<div class="promote-bar-text">' +
          '<strong style="color:var(--color-amber-deep);">' +
            (generating ? 'Generating draft…' : 'Page not yet generated') +
          '</strong>' +
          (generating
            ? 'Pagemaster is building the initial HTML. The chain will be runnable once status flips to <code>review</code>.'
            : 'The chain audits and refines an existing draft. Generate an initial HTML draft from this client\'s design spec, brief, and Surge audit before the audit/critique/polish/harden/clarify chain can run.') +
        '</div>' +
        (generating ? ''
          : '<button class="btn btn-primary" onclick="event.stopPropagation();generateDraft(\'' + page.id + '\');">' +
              'Generate draft →</button>') +
      '</div>';
  }

  var stagePanelsHtml = STAGES.map(function(s) {
    return renderStagePanel(page, s);
  }).join('');

  var surgeInputsHtml = renderSurgeInputsPanel(page);

  return '' +
    '<div class="body-meta-grid">' +
      '<div class="meta"><div class="meta-label">Page slug</div><div class="meta-value mono">/' + escapeHtml(page.page_slug || '') + '</div></div>' +
      '<div class="meta"><div class="meta-label">Target keyword</div><div class="meta-value">' + escapeHtml(keyword) + '</div></div>' +
      '<div class="meta"><div class="meta-label">Template</div><div class="meta-value mono">' + escapeHtml(page.template_version || 'v1') + '</div></div>' +
      '<div class="meta"><div class="meta-label">Last activity</div><div class="meta-value">' + escapeHtml(timeAgo(lastTouched)) + '</div></div>' +
    '</div>' +
    preChainHtml +
    promoteHtml +
    surgeInputsHtml +
    '<div class="stage-panels"' + (notInChain ? ' style="opacity:.45;pointer-events:none;"' : '') + '>' + stagePanelsHtml + '</div>';
}

// ── Surge inputs panel ────────────────────────────────────────────
//
// Page-scoped panel showing the three Surge artifacts that feed Pagemaster
// and the chain: RTPBA (content seed), schema_jsonb (deterministic schema
// blocks), and the Surge raw markdown (for inspection). Rendered above the
// stage panels because it's the *input* to all stages — useful to peek at
// before clicking Run on audit.
//
// Hidden when the page has no Surge data yet (pending_audit / surge pending).
function renderSurgeInputsPanel(page) {
  var hasRtpba = !!page.rtpba;
  var hasSchema = page.schema_jsonb && page.schema_jsonb.length > 0;
  if (!hasRtpba && !hasSchema) return '';

  // Default tab depends on what's there. RTPBA wins because it's the more
  // commonly-inspected artifact.
  var activeTab = hasRtpba ? 'rtpba' : 'schema';

  var rtpbaContent = hasRtpba
    ? '<pre>' + escapeHtml(page.rtpba) + '</pre>'
    : '<div class="empty">No RTPBA captured yet. Surge audit must complete first.</div>';

  var schemaContent;
  if (hasSchema) {
    var blocks = page.schema_jsonb;
    schemaContent = '<div style="font-size:.78rem;color:var(--color-muted);margin-bottom:.5rem;">' +
      blocks.length + ' block' + (blocks.length === 1 ? '' : 's') +
      ' · stored separately from page HTML · injected into &lt;head&gt; at serve time</div>' +
      '<pre>' + escapeHtml(JSON.stringify(blocks, null, 2)) + '</pre>';
    // Detect placeholder leakage (defensive — shouldn't happen with schema-builder)
    var jsonStr = JSON.stringify(blocks);
    var placeholderRe = /\[(?:Your|your-|YOUR-|path-to-|YYYY-MM-DD|PT_M_S|insert )[^\]]*\]/g;
    var ph = jsonStr.match(placeholderRe);
    if (ph && ph.length > 0) {
      schemaContent += '<div class="placeholder-warn">⚠ ' + ph.length +
        ' placeholder value(s) detected in generated schema: ' +
        Array.from(new Set(ph)).slice(0, 5).map(escapeHtml).join(', ') +
        '. Re-run Pagemaster after populating missing client data.</div>';
    }
  } else {
    schemaContent = '<div class="empty">No schema_jsonb yet. Pagemaster generates this when building the page.</div>';
  }

  return '' +
    '<div class="surge-inputs-panel" data-page-id="' + page.id + '">' +
      '<div class="surge-inputs-tabs">' +
        '<div class="surge-inputs-tab' + (activeTab === 'rtpba' ? ' active' : '') +
          '" onclick="switchSurgeTab(\'' + page.id + '\', \'rtpba\')">RTPBA' +
          (hasRtpba ? ' (' + Math.round(page.rtpba.length / 1000) + 'k chars)' : '') + '</div>' +
        '<div class="surge-inputs-tab' + (activeTab === 'schema' ? ' active' : '') +
          '" onclick="switchSurgeTab(\'' + page.id + '\', \'schema\')">Schema blocks' +
          (hasSchema ? ' (' + page.schema_jsonb.length + ')' : '') + '</div>' +
      '</div>' +
      '<div class="surge-inputs-body" data-tab="rtpba" style="' + (activeTab === 'rtpba' ? '' : 'display:none;') + '">' + rtpbaContent + '</div>' +
      '<div class="surge-inputs-body" data-tab="schema" style="' + (activeTab === 'schema' ? '' : 'display:none;') + '">' + schemaContent + '</div>' +
    '</div>';
}

function switchSurgeTab(pageId, tab) {
  var panel = document.querySelector('.surge-inputs-panel[data-page-id="' + pageId + '"]');
  if (!panel) return;
  panel.querySelectorAll('.surge-inputs-tab').forEach(function(t) {
    t.classList.toggle('active', t.textContent.toLowerCase().indexOf(tab) === 0 ||
      (tab === 'schema' && t.textContent.toLowerCase().indexOf('schema') === 0));
  });
  panel.querySelectorAll('.surge-inputs-body').forEach(function(b) {
    b.style.display = b.getAttribute('data-tab') === tab ? '' : 'none';
  });
}

// Render a single stage panel (collapsed by default; opens to show tabs).
function renderStagePanel(page, stageDef) {
  var stage = (page.stages && page.stages[stageDef.key]) || { ui_state: 'pending', latest: null, accepted: null, history_count: 0 };
  var skipped = isStageSkipped(page, stageDef.key);
  var ui = skipped ? 'pending' : (stage.ui_state || 'pending');
  var open = state.openStages.has(page.id + ':' + stageDef.key);

  var summaryHtml = renderStageSummary(stage, skipped);
  var actionsHtml = renderStageActions(page, stageDef, stage, skipped);

  var bodyId = 'sp-body-' + page.id + '-' + stageDef.key;
  var bodyHtml = open ? renderStageBody(page, stageDef, stage) : '';

  return '' +
    '<div class="stage-panel ' + (skipped ? 'skipped ' : '') + (open ? 'open' : '') + '" ' +
         'data-page-id="' + page.id + '" data-stage="' + stageDef.key + '">' +
      '<div class="stage-panel-header" onclick="toggleStagePanel(\'' + page.id + '\', \'' + stageDef.key + '\');">' +
        '<div class="stage-panel-glyph ' + ui + '">' + stageDef.glyph + '</div>' +
        '<div class="stage-panel-name">' + escapeHtml(stageDef.label) + '</div>' +
        '<div class="stage-panel-summary">' + summaryHtml + '</div>' +
        '<div class="stage-panel-actions" onclick="event.stopPropagation();">' + actionsHtml + '</div>' +
      '</div>' +
      '<div class="stage-panel-body" id="' + bodyId + '">' + bodyHtml + '</div>' +
    '</div>';
}

function renderStageSummary(stage, skipped) {
  if (skipped) return '<em>skipped — homepage only</em>';
  var latest = stage.latest;
  if (!latest) return 'not yet run';
  var fs = latest.findings_summary || {};
  var counts = fs.counts || {};
  var parts = [];
  if (latest.run_status === 'running') parts.push('running…');
  else if (latest.run_status === 'failed') parts.push('failed');
  else if (latest.run_status === 'timeout') parts.push('timed out');
  else {
    if (latest.duration_ms) parts.push(Math.round(latest.duration_ms / 1000) + 's');
    if (latest.input_tokens && latest.output_tokens) {
      parts.push(latest.input_tokens.toLocaleString() + '→' + latest.output_tokens.toLocaleString() + 'tok');
    }
    if (counts.P0 || counts.P1) {
      var bad = (counts.P0 || 0) + (counts.P1 || 0);
      parts.push(bad + ' blocking');
    }
    if (fs.claude_score && fs.claude_score.total != null) {
      parts.push(fs.claude_score.total + '/20');
    } else if (fs.design_health_score && fs.design_health_score.total != null) {
      parts.push(fs.design_health_score.total + '/40');
    }
  }
  if (stage.history_count > 1) parts.push(stage.history_count + ' runs');
  return parts.join(' · ');
}

function renderStageActions(page, stageDef, stage, skipped) {
  if (skipped) return '';
  var latest = stage.latest;

  // Eligibility for "Accept" / "Rerun": latest is complete and unaccepted.
  var canReview = latest && latest.run_status === 'complete' && !latest.accepted_at && !latest.rejected_at;
  // Eligibility for "Run": page status must permit this stage AND no in-flight run.
  var eligible = isStageEligible(page, stageDef.key);
  var inFlight = latest && latest.run_status === 'running';

  var html = '';
  if (canReview) {
    html += '<button class="btn btn-primary" onclick="acceptRun(\'' + latest.id + '\', \'' + stageDef.key + '\');">Accept</button>';
    if (eligible) {
      html += '<button class="btn btn-ghost" onclick="rerunStage(\'' + page.id + '\', \'' + stageDef.key + '\');">Rerun</button>';
    }
  } else if (inFlight) {
    html += '<button class="btn btn-ghost" disabled>Running…</button>';
  } else if (eligible) {
    html += '<button class="btn btn-primary" onclick="rerunStage(\'' + page.id + '\', \'' + stageDef.key + '\');">' +
            (latest ? 'Rerun' : 'Run') + '</button>';
  } else {
    // Not eligible: render a quiet "locked" hint instead of a button so the
    // operator sees why and where to start.
    html += '<span style="font-size:.72rem;color:var(--color-muted);font-style:italic;">' +
            stageGateHint(page, stageDef.key) + '</span>';
  }
  return html;
}

function stageGateHint(page, stageKey) {
  if (PRE_CHAIN_STATUSES.includes(page.status)) {
    return 'page not yet generated';
  }
  var allowed = PRE_STAGE_STATUS[stageKey] || [];
  // Find the prior stage that needs accepting first.
  var idx = STAGES.findIndex(function(s) { return s.key === stageKey; });
  if (idx > 0) {
    var prior = STAGES[idx - 1];
    if (isStageSkipped(page, prior.key)) {
      // Skip back another step
      if (idx > 1) prior = STAGES[idx - 2];
    }
    return 'awaiting ' + prior.label.toLowerCase();
  }
  return 'not available at status: ' + page.status;
}

// Render the full body of an open stage panel.
function renderStageBody(page, stageDef, stage) {
  var run = stage.latest;
  if (!run) {
    return '<div class="stage-empty">No run yet.<div class="hint">Click <strong>Run</strong> above to fire this stage.</div></div>';
  }
  if (run.run_status === 'running') {
    return '<div class="stage-empty">Running…<div class="hint">This panel will refresh automatically when the run completes.</div></div>';
  }
  if (run.run_status === 'failed' || run.run_status === 'timeout') {
    return '<div class="stage-empty" style="color:var(--color-danger);">' +
      escapeHtml(run.error_message || 'Run failed') +
      '<div class="hint" style="color:var(--color-muted);">Click <strong>Rerun</strong> to try again.</div></div>';
  }

  // Tabs depend on stage type.
  var tabs = stageTabsFor(stageDef.key);
  var stripHtml = renderQuestionsStrip(page, stageDef, run);

  // Content for each tab. Most tabs need run.html_before / html_after which are
  // not in the list payload — fetch on demand. Initially render placeholders;
  // ensureRunDetail() will fill them in.
  var tabContent = tabs.map(function(t, i) {
    var paneId = 'pane-' + page.id + '-' + stageDef.key + '-' + t.key;
    return '<div class="tab-pane' + (i === 0 ? ' active' : '') + '" id="' + paneId + '">' +
      renderTabPlaceholder(t.key) +
      '</div>';
  }).join('');

  var tabBtns = tabs.map(function(t, i) {
    return '<button class="tab-btn' + (i === 0 ? ' active' : '') + '" ' +
           'data-tab="' + t.key + '" ' +
           'onclick="switchTab(this, \'' + page.id + '\', \'' + stageDef.key + '\', \'' + t.key + '\');">' +
           escapeHtml(t.label) + '</button>';
  }).join('');

  return stripHtml +
    '<div class="tab-strip">' + tabBtns + '</div>' +
    tabContent;
}

function stageTabsFor(stageKey) {
  if (stageKey === 'audit' || stageKey === 'verify') {
    return [
      { key: 'findings', label: 'Findings' },
      { key: 'source',   label: 'Source HTML' }
    ];
  }
  if (stageKey === 'critique') {
    return [
      { key: 'findings', label: 'Findings' },
      { key: 'personas', label: 'Persona red flags' },
      { key: 'source',   label: 'Source HTML' }
    ];
  }
  // polish, harden, clarify
  return [
    { key: 'before',   label: 'Before' },
    { key: 'after',    label: 'After' },
    { key: 'diff',     label: 'Diff' },
    { key: 'findings', label: 'Findings' }
  ];
}

function renderTabPlaceholder(tabKey) {
  if (tabKey === 'before' || tabKey === 'after' || tabKey === 'source') {
    return '<div class="preview-empty">Loading…</div>';
  }
  return '<div class="stage-empty">Loading…</div>';
}

function renderQuestionsStrip(page, stageDef, run) {
  var fs = run.findings_summary || {};
  var qs = (fs.clarifying_questions || []).filter(function(q) { return q && !q.acknowledged_at; });
  if (qs.length === 0) return '';
  return '<div class="questions-strip">' +
    '<span class="questions-strip-icon">?</span>' +
    '<div class="questions-strip-text">' +
      '<strong>' + qs.length + ' clarifying question' + (qs.length === 1 ? '' : 's') + '</strong> from this run — Claude made best-effort choices and surfaced these for your review.' +
    '</div>' +
    '<a onclick="openQuestionsModal(\'' + run.id + '\', \'' + page.id + '\', \'' + stageDef.key + '\');">Review →</a>' +
    '</div>';
}

// ── Tab switching with on-demand run-detail fetching ──────────

function switchTab(btn, pageId, stageKey, tabKey) {
  var panel = document.querySelector('.stage-panel[data-page-id="' + pageId + '"][data-stage="' + stageKey + '"]');
  if (!panel) return;
  panel.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  panel.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('active'); });
  var paneId = 'pane-' + pageId + '-' + stageKey + '-' + tabKey;
  var pane = document.getElementById(paneId);
  if (pane) pane.classList.add('active');
  loadTabContent(pageId, stageKey, tabKey);
}

async function loadTabContent(pageId, stageKey, tabKey) {
  var page = state.pages.find(function(p) { return p.id === pageId; });
  if (!page) return;
  var stage = page.stages && page.stages[stageKey];
  if (!stage || !stage.latest) return;
  var runId = stage.latest.id;
  var paneId = 'pane-' + pageId + '-' + stageKey + '-' + tabKey;
  var pane = document.getElementById(paneId);
  if (!pane) return;

  // Fetch run detail (cached) when we need html_before/html_after/findings.
  var detail = state.runDetailCache[runId];
  if (!detail) {
    try {
      var resp = await fetch('/api/page-stages/run?id=' + encodeURIComponent(runId), { credentials: 'same-origin' });
      if (!resp.ok) {
        pane.innerHTML = '<div class="stage-empty" style="color:var(--color-danger);">Failed to fetch run detail (' + resp.status + ')</div>';
        return;
      }
      var data = await resp.json();
      detail = data.run;
      state.runDetailCache[runId] = detail;
    } catch (e) {
      pane.innerHTML = '<div class="stage-empty" style="color:var(--color-danger);">' + escapeHtml(e.message) + '</div>';
      return;
    }
  }

  pane.innerHTML = renderTab(tabKey, detail, stageKey);
}

function renderTab(tabKey, run, stageKey) {
  if (tabKey === 'findings') return renderFindingsTab(run, stageKey);
  if (tabKey === 'source')   return renderSourceTab(run);
  if (tabKey === 'before')   return renderHtmlPreview(run.html_before, 'before');
  if (tabKey === 'after')    return renderHtmlPreview(run.html_after, 'after');
  if (tabKey === 'diff')     return renderDiffTab(run);
  if (tabKey === 'personas') return renderPersonasTab(run);
  return '<div class="stage-empty">Unknown tab.</div>';
}

function renderFindingsTab(run, stageKey) {
  var fs = run.findings_summary || {};
  var html = '';

  // Stage-specific score blocks at the top.
  if (stageKey === 'audit' || stageKey === 'verify') {
    var s = fs.claude_score || {};
    if (s.total != null) {
      var totalCls = s.total >= 16 ? '' : (s.total >= 12 ? 'warn' : 'bad');
      html += '<div class="score-block">' +
        '<div class="score-cell total ' + totalCls + '"><span class="num">' + s.total + '/20</span><span class="label">Total</span></div>' +
        '<div class="score-cell"><span class="num">' + (s.theming != null ? s.theming : '—') + '/4</span><span class="label">Theming</span></div>' +
        '<div class="score-cell"><span class="num">' + (s.responsive != null ? s.responsive : '—') + '/4</span><span class="label">Responsive</span></div>' +
        '<div class="score-cell"><span class="num">' + (s.performance != null ? s.performance : '—') + '/4</span><span class="label">Perf</span></div>' +
        '<div class="score-cell"><span class="num">' + (s.accessibility != null ? s.accessibility : '—') + '/4</span><span class="label">A11y</span></div>' +
        '<div class="score-cell"><span class="num">' + (s.anti_patterns != null ? s.anti_patterns : '—') + '/4</span><span class="label">Anti-patterns</span></div>' +
      '</div>';
    }
    if (fs.executive_summary) {
      html += '<div class="diff-summary" style="background:var(--color-bg);border-color:var(--color-border);">' +
        escapeHtml(fs.executive_summary) + '</div>';
    }
  }
  if (stageKey === 'critique') {
    var ds = fs.design_health_score || {};
    if (ds.total != null) {
      var dCls = ds.total >= 32 ? '' : (ds.total >= 22 ? 'warn' : 'bad');
      html += '<div class="score-block">' +
        '<div class="score-cell total ' + dCls + '"><span class="num">' + ds.total + '/40</span><span class="label">Nielsen 10</span></div>' +
      '</div>';
    }
    if (fs.overall_impression) {
      html += '<div class="diff-summary" style="background:var(--color-bg);border-color:var(--color-border);">' +
        escapeHtml(fs.overall_impression) + '</div>';
    }
  }

  // Findings array.
  var findings = run.findings || [];
  if (findings.length === 0) {
    html += '<div class="stage-empty">No findings recorded.</div>';
    return html;
  }
  var findingsHtml = findings.map(function(f) {
    var sev = (f.severity || 'P3').toString().toUpperCase();
    return '<div class="finding">' +
      '<div class="finding-sev ' + sev + '">' + sev + '</div>' +
      '<div class="finding-body">' +
        '<div class="finding-title">' + escapeHtml(f.category || f.title || 'Finding') + '</div>' +
        (f.location ? '<div class="finding-loc">' + escapeHtml(f.location) + '</div>' : '') +
        (f.impact ? '<div class="finding-rec">' + escapeHtml(f.impact) + '</div>' : '') +
        (f.recommendation ? '<div class="finding-rec" style="margin-top:.25rem;color:var(--color-primary-hover);"><strong>Fix:</strong> ' + escapeHtml(f.recommendation) + '</div>' : '') +
      '</div>' +
    '</div>';
  }).join('');
  html += '<div class="findings-list">' + findingsHtml + '</div>';
  return html;
}

function renderSourceTab(run) {
  var src = run.html_before || '';
  if (!src) return '<div class="preview-empty">No source HTML on this run.</div>';
  return '<div class="source-html-pre">' + escapeHtml(src) + '</div>';
}

function renderHtmlPreview(html, label) {
  if (!html) return '<div class="preview-empty">No ' + escapeHtml(label) + ' HTML on this run.</div>';
  // Render via srcdoc — full HTML doc inside an iframe, sandboxed.
  var safeDoc = html.replace(/"/g, '&quot;');
  return '<div class="preview-wrap">' +
    '<iframe sandbox="allow-same-origin" srcdoc="' + safeDoc + '"></iframe>' +
    '</div>';
}

function renderDiffTab(run) {
  var fs = run.findings_summary || {};
  var html = '';
  if (run.diff_summary) {
    html += '<div class="diff-summary">' + escapeHtml(run.diff_summary) + '</div>';
  }
  var changes = fs.changes || [];
  if (changes.length === 0 && (fs.findings_resolved || []).length === 0) {
    if (!html) html = '<div class="stage-empty">No structured diff recorded.</div>';
    return html;
  }
  if (fs.findings_resolved && fs.findings_resolved.length) {
    html += '<div style="margin-bottom:.65rem;font-size:.8rem;font-weight:600;color:var(--color-heading);">Resolved findings</div>';
    html += '<ul style="margin:0 0 .85rem 1.25rem;font-size:.8rem;line-height:1.55;color:var(--color-body);">' +
      fs.findings_resolved.map(function(r) { return '<li>' + escapeHtml(r) + '</li>'; }).join('') +
      '</ul>';
  }
  if (changes.length) {
    html += '<div style="margin-bottom:.4rem;font-size:.8rem;font-weight:600;color:var(--color-heading);">Section-by-section</div>';
    html += '<div class="diff-changes">' +
      changes.map(function(c) {
        return '<div class="diff-change">' +
          '<div class="diff-change-section">' + escapeHtml(c.section || 'Section') + '</div>' +
          '<div class="diff-change-reason">' + escapeHtml(c.reason || '') + '</div>' +
        '</div>';
      }).join('') +
    '</div>';
  }
  return html;
}

function renderPersonasTab(run) {
  var personas = (run.findings_summary || {}).persona_red_flags || [];
  if (personas.length === 0) return '<div class="stage-empty">No persona red flags recorded.</div>';
  return personas.map(function(p) {
    return '<div class="persona-block">' +
      '<h4>' + escapeHtml(p.persona || 'Persona') + '</h4>' +
      '<ul>' + (p.flags || []).map(function(f) { return '<li>' + escapeHtml(f) + '</li>'; }).join('') + '</ul>' +
    '</div>';
  }).join('');
}

// ── Stage panel toggle ─────────────────────────────────────
function toggleStagePanel(pageId, stageKey) {
  var key = pageId + ':' + stageKey;
  var panel = document.querySelector('.stage-panel[data-page-id="' + pageId + '"][data-stage="' + stageKey + '"]');
  if (!panel) return;
  if (state.openStages.has(key)) {
    state.openStages.delete(key);
    panel.classList.remove('open');
    // Don't blow away rendered content — keep it for instant re-open.
    return;
  }
  state.openStages.add(key);
  panel.classList.add('open');
  // Render body if not yet rendered.
  var body = panel.querySelector('.stage-panel-body');
  if (body && body.innerHTML.trim() === '') {
    var page = state.pages.find(function(p) { return p.id === pageId; });
    var stageDef = STAGES.find(function(s) { return s.key === stageKey; });
    var stage = page && page.stages ? page.stages[stageKey] : null;
    if (page && stage && stageDef) {
      body.innerHTML = renderStageBody(page, stageDef, stage);
      // Auto-load first tab.
      var firstTab = body.querySelector('.tab-btn');
      if (firstTab) {
        var tabKey = firstTab.getAttribute('data-tab');
        loadTabContent(pageId, stageKey, tabKey);
      }
    }
  }
}

// ── Run / accept / rerun actions ───────────────────────────
async function rerunStage(pageId, stageKey, operatorNotes) {
  var page = state.pages.find(function(p) { return p.id === pageId; });
  if (!page) return;
  try {
    var body = { content_page_id: pageId };
    if (operatorNotes) body.operator_notes = operatorNotes;
    var resp = await fetch('/api/page-stages/' + stageKey, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify(body)
    });
    // Don't await the full body — Claude takes minutes. Just fire and refresh.
    // The list endpoint will show the running row.
    setTimeout(load, 1000);
    if (!resp.ok && resp.status !== 504) {
      // 504 is expected if we hit edge timeout; the run continues server-side.
      try { var err = await resp.json(); alert(err.error || ('HTTP ' + resp.status)); } catch (_) {}
    }
  } catch (e) {
    // Fetch may abort with a network error after the server keeps working —
    // that's fine, the row was created. Refresh shortly.
    setTimeout(load, 1000);
  }
}

async function acceptRun(runId, stageKey, override) {
  var url = '/api/page-stages/' + stageKey + '?run_id=' + encodeURIComponent(runId) + '&action=accept';
  var body = override ? { override: true } : {};
  try {
    var resp = await fetch(url, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify(body)
    });
    var data = await resp.json();
    if (!resp.ok) {
      // Verify gate failure path — offer override.
      if (data.error && /gate failed/i.test(data.error)) {
        if (confirm(data.error + '\n\nOverride and continue?')) {
          return acceptRun(runId, stageKey, true);
        }
        return;
      }
      alert(data.error || ('HTTP ' + resp.status));
      return;
    }
    // Wipe cached run detail for this run since accept can flip its accepted_at
    // status; force fresh fetch on next tab open.
    delete state.runDetailCache[runId];
    load();
  } catch (e) {
    alert('Network error: ' + e.message);
  }
}

async function promotePage(pageId) {
  var page = state.pages.find(function(p) { return p.id === pageId; });
  if (!page) return;
  if (page.status === 'ready_for_contract') {
    if (!confirm('Extract design contract for ' + (page.client_slug || 'this client') + '? This locks the homepage tokens, voice, and copy conventions for all subsequent pages.')) return;
    try {
      var resp = await fetch('/api/page-stages/extract-contract', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ content_page_id: pageId })
      });
      var data = await resp.json();
      if (!resp.ok) { alert(data.error || 'Extract failed'); return; }
      load();
    } catch (e) { alert('Network error: ' + e.message); }
    return;
  }
  if (page.status === 'ready_for_client') {
    alert('Client review portal queueing endpoint coming in the next session. For now, status is correct and the page is ready.');
    return;
  }
}

async function generateDraft(pageId) {
  var page = state.pages.find(function(p) { return p.id === pageId; });
  if (!page) return;
  if (!confirm('Generate an initial HTML draft for "' + (page.page_name || 'this page') + '"? This uses the client\'s design spec, brief, and Surge audit. Takes 1-3 minutes.')) return;
  // The endpoint streams NDJSON. We don't need to consume it — just fire and
  // refresh; the status flip from pending_audit/audit_loaded → generating →
  // review will surface in the list endpoint as the run progresses.
  try {
    fetch('/api/generate-content-page', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ content_page_id: pageId })
    }).catch(function() {}); // swallow — server keeps working
    setTimeout(load, 1500);
  } catch (e) {
    setTimeout(load, 1500);
  }
}

// ── Clarifying questions modal ─────────────────────────────
async function openQuestionsModal(runId, pageId, stageKey) {
  // Need full run detail to render questions.
  var detail = state.runDetailCache[runId];
  if (!detail) {
    try {
      var resp = await fetch('/api/page-stages/run?id=' + encodeURIComponent(runId), { credentials: 'same-origin' });
      var data = await resp.json();
      detail = data.run;
      state.runDetailCache[runId] = detail;
    } catch (e) { alert('Failed to load run detail: ' + e.message); return; }
  }
  var qs = ((detail.findings_summary || {}).clarifying_questions || []);
  // Open the first unacknowledged question; for multiple, surface them sequentially.
  var firstUnack = qs.findIndex(function(q) { return q && !q.acknowledged_at; });
  if (firstUnack === -1) { alert('All questions on this run are already resolved.'); return; }
  showQuestionModal(detail, firstUnack, pageId, stageKey);
}

function showQuestionModal(run, qIdx, pageId, stageKey) {
  var q = (run.findings_summary || {}).clarifying_questions[qIdx];
  if (!q) return;
  var optionsHtml = '';
  if (Array.isArray(q.options) && q.options.length) {
    optionsHtml = '<div class="options"><div class="options-label">Options Claude offered</div>' +
      q.options.map(function(opt, i) {
        var optId = 'opt-' + run.id + '-' + qIdx + '-' + i;
        return '<div class="option-row">' +
          '<input type="radio" name="cq-opt-' + run.id + '-' + qIdx + '" id="' + optId + '" value="' + escapeHtml(opt) + '">' +
          '<label for="' + optId + '">' + escapeHtml(opt) + '</label>' +
        '</div>';
      }).join('') +
      '</div>';
  }

  var modalHtml =
    '<div class="modal-backdrop" id="cqModal" onclick="if(event.target.id===\'cqModal\')closeQuestionModal();">' +
      '<div class="modal" role="dialog" aria-modal="true">' +
        '<div class="modal-header">' +
          '<div class="topic">' + escapeHtml(q.topic || 'Clarifying question') + '</div>' +
          '<h3>' + escapeHtml(stageKey) + ' — question ' + (qIdx + 1) + '</h3>' +
        '</div>' +
        '<div class="modal-body">' +
          '<div class="question">' + escapeHtml(q.question || '') + '</div>' +
          (q.decision_taken ? '<div class="decision"><strong>Claude\'s choice:</strong> ' + escapeHtml(q.decision_taken) + '</div>' : '') +
          optionsHtml +
          '<label style="font-size:.7rem;color:var(--color-muted);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:.25rem;">Optional note for the rerun</label>' +
          '<textarea id="cqNote" placeholder="Add any extra context Claude should consider on the rerun…"></textarea>' +
        '</div>' +
        '<div class="modal-actions">' +
          '<button class="btn btn-ghost" onclick="closeQuestionModal();">Cancel</button>' +
          '<button class="btn btn-ghost" onclick="acknowledgeQuestion(\'' + run.id + '\', ' + qIdx + ', \'' + pageId + '\', \'' + stageKey + '\');">Accept Claude\'s choice</button>' +
          '<button class="btn btn-primary" onclick="rerunWithChoice(\'' + run.id + '\', ' + qIdx + ', \'' + pageId + '\', \'' + stageKey + '\');">Rerun with this answer</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  // Insert
  var existing = document.getElementById('cqModal');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', modalHtml);
}

function closeQuestionModal() {
  var m = document.getElementById('cqModal');
  if (m) m.remove();
}

async function acknowledgeQuestion(runId, qIdx, pageId, stageKey) {
  try {
    var resp = await fetch('/api/page-stages/clarifying-question', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ run_id: runId, question_index: qIdx, action: 'acknowledge' })
    });
    var data = await resp.json();
    if (!resp.ok) { alert(data.error || 'Failed'); return; }
    closeQuestionModal();
    delete state.runDetailCache[runId];
    load();
  } catch (e) { alert('Network error: ' + e.message); }
}

async function rerunWithChoice(runId, qIdx, pageId, stageKey) {
  var modal = document.getElementById('cqModal');
  if (!modal) return;
  var picked = modal.querySelector('input[name="cq-opt-' + runId + '-' + qIdx + '"]:checked');
  var choice = picked ? picked.value : '';
  var noteEl = document.getElementById('cqNote');
  var note = noteEl ? noteEl.value.trim() : '';
  if (!choice && !note) {
    alert('Pick an option or add a note for the rerun.');
    return;
  }
  try {
    var resp = await fetch('/api/page-stages/clarifying-question', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ run_id: runId, question_index: qIdx, action: 'rerun_with_choice', choice: choice, note: note })
    });
    var data = await resp.json();
    if (!resp.ok) { alert(data.error || 'Failed'); return; }
    closeQuestionModal();
    delete state.runDetailCache[runId];
    // Now fire the rerun with the operator_notes returned by the endpoint.
    await rerunStage(pageId, stageKey, data.rerun_notes);
  } catch (e) { alert('Network error: ' + e.message); }
}

// Card interactions
function toggleCard(pageId) {
  if (state.expanded.has(pageId)) state.expanded.delete(pageId);
  else state.expanded.add(pageId);
  // Re-render only the affected card to preserve scroll
  var el = document.querySelector('.card[data-page-id="' + pageId + '"]');
  if (el) el.classList.toggle('expanded');
}

function expandCard(pageId, stageHint) {
  if (!state.expanded.has(pageId)) {
    state.expanded.add(pageId);
    var el = document.querySelector('.card[data-page-id="' + pageId + '"]');
    if (el) el.classList.add('expanded');
  }
  // Stage hint reserved for session 2: scroll to the relevant stage panel.
}

// Boot
window.addEventListener('DOMContentLoaded', function() {
  state.slug = getSlugFromUrl();
  if (!state.slug) {
    document.getElementById('content').innerHTML =
      '<div class="empty-state"><h3>No client selected</h3>' +
      '<p>Add <code>?slug=&lt;client-slug&gt;</code> to the URL to view that client\'s pages.</p>' +
      '<p style="margin-top:.5rem;font-size:.8rem;">Example: <a href="?slug=mark-obrien">mark-obrien</a> &bull; <a href="?slug=anna-skomorovskaia">anna-skomorovskaia</a></p>' +
      '</div>';
    return;
  }
  document.getElementById('subtitle').textContent =
    'Pages chain for ' + state.slug + ' — automated audit, critique, polish, harden, clarify, then verify and queue for client review.';
  load();
});
</script>
